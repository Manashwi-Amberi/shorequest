<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>ShoreQuest AI</title>

    <link rel="stylesheet" href="chatbot.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
          rel="stylesheet">

</head>

<body>

    <div class="chat-page">

        <!-- HEADER -->

        <div class="chat-header">

            <h1>🌊 ShoreQuest AI Assistant</h1>

            <a href="index.html">
                ← Back to Home
            </a>

        </div>

        <!-- CHAT AREA -->

        <div id="chat-messages"
             class="chat-messages">

            <div class="bot-message">

                Hey! I can help you explore beaches,
                activities, travel suggestions,
                safety information, and more 🌴

            </div>

        </div>

        <!-- INPUT -->

        <div class="chat-input-container">

            <input type="text"
                   id="chat-input"
                   placeholder="Ask something about beaches...">

            <button id="send-btn">
                Send
            </button>

        </div>

    </div>

    <script src="chatbot.js"></script>

</body>

</html>
